<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ZERO TRACE</title>

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

    <!-- CONNECT PAGE -->

    <div class="connect-page" id="connect-page">

        <div class="connect-card">

            <div class="top-right">
                NO IDENTITY <br>
                FOUND
            </div>

            <h1 class="logo">
                <span class="white">ZERO</span>
                <span class="red">TRACE</span>
            </h1>

            <p class="desc">
                Chat Anonymously<span class="blink">_</span>
            </p>

            <label>
                👤 USERNAME
            </label>

            <input
                type="text"
                id="username"
                placeholder="e.g. Harsh"
            >

            <label>
                🔒 ROOM CODE
            </label>

            <input
                type="text"
                id="room"
                placeholder="e.g. 192.168.1.1"
            >

            <div class="warning-box">
                ⚠ Anyone Using The Same Room Code
                Can Join This Chat.
            </div>

            <button onclick="joinRoom()">
                CONNECT →
            </button>

            <div class="footer-left">
                SYSTEM WATCHING... <br>
                <span>STAY ANONYMOUS</span>
            </div>

            <div class="version">
                v 0.0.1
            </div>

        </div>

    </div>

    <!-- CHAT PAGE -->

    <div class="chat-page" id="chat-page">

        <div id="messages"></div>

    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <script src="/static/script.js"></script>

</body>

</html>
